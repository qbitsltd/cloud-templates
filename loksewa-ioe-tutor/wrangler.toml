name = "loksewa-ioe-tutor"
main = "src/index.ts"
compatibility_date = "2026-07-15"

[ai]
binding = "AI"

[vars]
QBITS_VALIDATE_URL = "https://ai.qbits.ltd/api/validate"
INSTALLATION_TOKEN = "__INSTALLATION_TOKEN__"
OPERATION_TOKEN = "__OPERATION_TOKEN__"
SCORING_MODE = "strict-json"

[[kv_namespaces]]
binding = "RUNS"
id = "replace-with-your-run-log-kv-id"
